<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Tree - Smart Inertia</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; font-family: 'Times New Roman', serif; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* UI Layer */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; 
            align-items: center;
            padding-top: 40px;
            box-sizing: border-box;
            transition: opacity 0.5s ease;
        }

        .fullscreen-hidden {
            opacity: 0 !important;
            pointer-events: none !important;
            transition: opacity 0.5s ease;
        }
        
        .ui-hidden { opacity: 0; pointer-events: none !important; }

        /* Loading */
        #loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out;
        }
        .loader-text {
            color: #d4af37; font-size: 14px; letter-spacing: 4px; margin-top: 20px;
            text-transform: uppercase; font-weight: 100;
        }
        .spinner {
            width: 40px; height: 40px; border: 1px solid rgba(212, 175, 55, 0.2); 
            border-top: 1px solid #d4af37; border-radius: 50%; 
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Title */
        h1 { 
            color: #fceea7; font-size: 56px; margin: 0; font-weight: 400; 
            letter-spacing: 6px; 
            text-shadow: 0 0 50px rgba(252, 238, 167, 0.6); 
            background: linear-gradient(to bottom, #fff, #eebb66);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Cinzel', 'Times New Roman', serif;
            opacity: 0.9;
        }

        /* Controls */
        .controls-wrapper {
            margin-top: 20px; pointer-events: auto; text-align: center;
            transition: opacity 0.5s ease; display: flex; flex-direction: column; gap: 10px; align-items: center;
        }
        .btn-row { display: flex; gap: 15px; align-items: center; }
        .upload-btn {
            background: rgba(20, 20, 20, 0.6); border: 1px solid rgba(212, 175, 55, 0.4); 
            color: #d4af37; padding: 8px 15px; cursor: pointer; text-transform: uppercase; 
            letter-spacing: 2px; font-size: 10px; transition: all 0.4s;
            display: inline-flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px); min-width: 100px;
        }
        .upload-btn:hover { background: #d4af37; color: #000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
        #music-toggle {
            width: 30px; height: 30px; border-radius: 50%; border: 1px solid #d4af37;
            background: rgba(0,0,0,0.5); color: #d4af37; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-size: 12px; transition: all 0.3s;
        }
        #music-toggle:hover { background: #d4af37; color: #000; }
        #music-toggle.playing { background: rgba(212, 175, 55, 0.3); box-shadow: 0 0 10px #d4af37; }
        .hint-text { color: rgba(212, 175, 55, 0.5); font-size: 9px; margin-top: 5px; letter-spacing: 1px; text-transform: uppercase; }
        input[type="file"] { display: none; }

        /* Left Bottom Hint */
        #controls-hint {
            position: absolute; bottom: 30px; left: 30px;
            color: rgba(255, 255, 255, 0.6); font-size: 14px; font-family: sans-serif; line-height: 1.6;
            pointer-events: none; background: rgba(0,0,0,0.5); padding: 15px;
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 4px; z-index: 20;
            transition: opacity 0.5s ease;
        }
        .key { color: #d4af37; font-weight: bold; border: 1px solid #d4af37; padding: 2px 6px; border-radius: 3px; margin-right: 5px; }
        .status-indicator { color: #44ff44; font-size: 12px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .status-indicator.fallback { color: #ffaa44; }

        #webcam-wrapper {
            position: absolute; bottom: 40px; right: 40px;
            width: 120px; height: 90px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; opacity: 0; pointer-events: none;
        }
    </style>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>
</head>
<body>

    <audio id="bgm" loop></audio>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading Holiday Magic</div>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <h1>Merry Christmas</h1>
        <div class="controls-wrapper ui-element-to-hide">
            <div class="btn-row">
                <label class="upload-btn">Add Photos<input type="file" id="file-input" multiple accept="image/*"></label>
                <label class="upload-btn">Upload BGM<input type="file" id="music-input" accept="audio/*"></label>
                <div id="music-toggle" title="Play/Pause">♫</div>
            </div>
            <div class="hint-text">Press 'H' to Hide UI | 'F' for Fullscreen</div>
        </div>
    </div>

    <div id="controls-hint" class="ui-element-to-hide">
        <div id="mode-status" class="status-indicator">Initializing...</div>
        <div><span class="key">1</span> Tree Mode</div>
        <div><span class="key">2</span> Scatter Mode</div>
        <div><span class="key">Space</span> Zoom Photo</div>
        <div><span class="key">F</span> Fullscreen</div>
    </div>

    <div id="webcam-wrapper">
        <video id="webcam" autoplay playsinline style="display:none;"></video>
        <canvas id="webcam-preview"></canvas>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js'; 
        import { FilesetResolver, HandLandmarker } from '@mediapipe/tasks-vision';
        import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

        const CONFIG = {
            colors: {
                bg: 0x000000, 
                champagneGold: 0xffd966, 
                deepGreen: 0x03180a,     
                accentRed: 0x990000, 
                trunkSparkle: 0xffeebb,
                branchGreen: 0x0a2910 
            },
            particles: {
                count: 1200,     // 保持 1200
                dustCount: 2300, // 保持 2300
                treeHeight: 24,  
                treeRadius: 8    
            },
            camera: { z: 50 }
        };

        const STATE = {
            mode: 'TREE', 
            focusIndex: -1, 
            focusTarget: null,
            hand: { detected: false, x: 0, y: 0 },
            rotation: { x: 0, y: 0, velX: 0, velY: 0 }, 
            inputType: 'NONE'
        };

        let scene, camera, renderer, composer;
        let mainGroup; 
        let bgStarGroup; 
        let bgStars = []; 
        let clock = new THREE.Clock();
        let particleSystem = []; 
        let photoMeshGroup = new THREE.Group();
        let handLandmarker, video, webcamCanvas, webcamCtx;
        let caneTexture; 

        // Audio Refs
        const bgm = document.getElementById('bgm');
        const musicToggle = document.getElementById('music-toggle');

        async function init() {
            initThree();
            setupEnvironment(); 
            setupLights();
            createTextures();
            createParticles(); 
            createDust();
            createBackgroundStars(); 
            createDefaultPhotos();
            setupPostProcessing();
            setupEvents();
            setupKeyboard(); 
            setupFullscreenLogic(); 
            setupAudioLogic();

            await tryInitWebcam();
            
            const loader = document.getElementById('loader');
            loader.style.opacity = 0;
            setTimeout(() => loader.remove(), 800);

            animate();
        }

        function setupAudioLogic() {
            document.getElementById('music-input').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    bgm.src = url;
                    bgm.play().then(() => {
                        musicToggle.classList.add('playing');
                        musicToggle.innerHTML = '❚❚';
                    }).catch(err => console.log("Audio play failed:", err));
                }
            });
            musicToggle.addEventListener('click', () => {
                if (bgm.paused) {
                    if (bgm.src) {
                        bgm.play();
                        musicToggle.classList.add('playing');
                        musicToggle.innerHTML = '❚❚';
                    } else { alert("Please upload music first!"); }
                } else {
                    bgm.pause();
                    musicToggle.classList.remove('playing');
                    musicToggle.innerHTML = '▶';
                }
            });
        }

        function setupFullscreenLogic() {
            const uiElements = document.querySelectorAll('.ui-element-to-hide');
            document.addEventListener('fullscreenchange', () => {
                if (document.fullscreenElement) {
                    uiElements.forEach(el => el.classList.add('fullscreen-hidden'));
                } else {
                    uiElements.forEach(el => el.classList.remove('fullscreen-hidden'));
                }
            });
        }

        async function tryInitWebcam() {
            const statusEl = document.getElementById('mode-status');
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error("Browser API not supported");
                }
                video = document.getElementById('webcam');
                webcamCanvas = document.getElementById('webcam-preview');
                webcamCtx = webcamCanvas.getContext('2d');
                webcamCanvas.width = 160; webcamCanvas.height = 120;
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate: "GPU" },
                    runningMode: "VIDEO", numHands: 1
                });
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
                STATE.inputType = 'WEBCAM';
                statusEl.textContent = "● Webcam Active";
            } catch (err) {
                console.warn("Webcam fallback", err);
                setupMouseFallback();
                STATE.inputType = 'MOUSE';
                statusEl.textContent = "● Mouse Mode";
                statusEl.classList.add('fallback');
            }
        }

        function setupMouseFallback() {
            window.addEventListener('mousemove', (e) => {
                STATE.hand.detected = true; 
                STATE.hand.x = (e.clientX / window.innerWidth - 0.5) * 2;
                STATE.hand.y = (e.clientY / window.innerHeight - 0.5) * 2;
            });
        }

        function setupKeyboard() {
            window.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'h') {
                    const controls = document.querySelector('.controls-wrapper');
                    if (controls) controls.classList.toggle('ui-hidden');
                }
                else if (key === 'f') {
                    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => console.log(err));
                    else document.exitFullscreen();
                }
                else if (key === '1') { STATE.mode = 'TREE'; STATE.focusTarget = null; } 
                else if (key === '2') { STATE.mode = 'SCATTER'; STATE.focusTarget = null; } 
                else if (key === ' ' || key === '3') {
                    if (STATE.mode !== 'FOCUS') {
                        STATE.mode = 'FOCUS';
                        const photos = particleSystem.filter(p => p.type === 'PHOTO');
                        if (photos.length > 0) STATE.focusTarget = photos[Math.floor(Math.random() * photos.length)].mesh;
                    }
                }
            });
        }

        let lastVideoTime = -1;
        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                if (handLandmarker) {
                    const result = handLandmarker.detectForVideo(video, performance.now());
                    processGestures(result);
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        function processGestures(result) {
            if (result.landmarks && result.landmarks.length > 0) {
                STATE.hand.detected = true;
                const lm = result.landmarks[0];
                STATE.hand.x = (lm[9].x - 0.5) * 2; 
                STATE.hand.y = (lm[9].y - 0.5) * 2;

                const thumb = lm[4];
                const index = lm[8];
                const wrist = lm[0];

                const pinchDist = Math.hypot(thumb.x - index.x, thumb.y - index.y);

                let avgOpenness = 0;
                [lm[8], lm[12], lm[16], lm[20]].forEach(t => {
                    avgOpenness += Math.hypot(t.x - wrist.x, t.y - wrist.y);
                });
                avgOpenness /= 4;
                
                if (avgOpenness < 0.28) { 
                    STATE.mode = 'TREE'; 
                    STATE.focusTarget = null; 
                } 
                else if (pinchDist < 0.06) {
                    if (STATE.mode !== 'FOCUS') {
                        STATE.mode = 'FOCUS';
                        const photos = particleSystem.filter(p => p.type === 'PHOTO');
                        if (photos.length) STATE.focusTarget = photos[Math.floor(Math.random()*photos.length)].mesh;
                    }
                } 
                else if (avgOpenness > 0.40) { 
                    STATE.mode = 'SCATTER'; 
                    STATE.focusTarget = null; 
                }

            } else { 
                STATE.hand.detected = false; 
            }
        }

        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(CONFIG.colors.bg);
            scene.fog = new THREE.FogExp2(CONFIG.colors.bg, 0.01); 
            camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, CONFIG.camera.z); 
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ReinhardToneMapping; 
            renderer.toneMappingExposure = 2.2; 
            container.appendChild(renderer.domElement);
            mainGroup = new THREE.Group();
            scene.add(mainGroup);
        }

        function setupEnvironment() {
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;
        }

        function setupLights() {
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const innerLight = new THREE.PointLight(0xffaa00, 2, 20);
            innerLight.position.set(0, 5, 0);
            mainGroup.add(innerLight);
            const spotGold = new THREE.SpotLight(0xffcc66, 1200);
            spotGold.position.set(30, 40, 40);
            spotGold.angle = 0.5; spotGold.penumbra = 0.5;
            scene.add(spotGold);
            const spotBlue = new THREE.SpotLight(0x6688ff, 600);
            spotBlue.position.set(-30, 20, -30);
            scene.add(spotBlue);
            const fill = new THREE.DirectionalLight(0xffeebb, 0.8);
            fill.position.set(0, 0, 50);
            scene.add(fill);
        }

        function setupPostProcessing() {
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.7; bloomPass.strength = 0.45; bloomPass.radius = 0.4;
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
        }

        function createTextures() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffc0cb'; ctx.fillRect(0,0,128,128);
            ctx.fillStyle = '#b30000'; 
            ctx.beginPath();
            for(let i=-128; i<256; i+=32) { ctx.moveTo(i, 0); ctx.lineTo(i+32, 128); ctx.lineTo(i+16, 128); ctx.lineTo(i-16, 0); }
            ctx.fill();
            caneTexture = new THREE.CanvasTexture(canvas);
            caneTexture.wrapS = THREE.RepeatWrapping; caneTexture.wrapT = THREE.RepeatWrapping;
            caneTexture.repeat.set(3, 3); caneTexture.colorSpace = THREE.SRGBColorSpace;
        }

        function createGiftBoxMesh(boxGeo, boxMat, ribbonColorHex) {
            const group = new THREE.Group();
            const box = new THREE.Mesh(boxGeo, boxMat);
            group.add(box);
            const ribbonMat = new THREE.MeshStandardMaterial({ color: ribbonColorHex, metalness: 0.8, roughness: 0.3, emissive: ribbonColorHex, emissiveIntensity: 0.2 });
            
            const ribbonZ = new THREE.Mesh(new THREE.BoxGeometry(0.58, 0.58, 0.12), ribbonMat);
            const ribbonX = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.58, 0.58), ribbonMat);
            group.add(ribbonZ); group.add(ribbonX);
            const bowGeo = new THREE.BoxGeometry(0.3, 0.1, 0.1);
            const bow1 = new THREE.Mesh(bowGeo, ribbonMat);
            bow1.position.set(0, 0.3, 0); bow1.rotation.y = Math.PI / 4;
            const bow2 = new THREE.Mesh(bowGeo, ribbonMat);
            bow2.position.set(0, 0.3, 0); bow2.rotation.y = -Math.PI / 4;
            group.add(bow1); group.add(bow2);
            return group;
        }

        function createBackgroundStars() {
            const geo = new THREE.OctahedronGeometry(0.05, 0); 
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
            bgStarGroup = new THREE.Group();
            for(let i = 0; i < 500; i++) {
                const mesh = new THREE.Mesh(geo, mat);
                const r = 35 + Math.random() * 40;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                mesh.position.set(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
                const s = 0.5 + Math.random() * 1.2; 
                mesh.scale.setScalar(s);
                bgStarGroup.add(mesh);
                bgStars.push({ mesh: mesh, baseScale: s, blinkSpeed: 2 + Math.random() * 4, phase: Math.random() * Math.PI * 2 });
            }
            scene.add(bgStarGroup);
        }

        class Particle {
            constructor(mesh, type, isDust = false) {
                this.mesh = mesh; this.type = type; this.isDust = isDust;
                this.posTree = new THREE.Vector3(); this.posScatter = new THREE.Vector3();
                this.baseScale = mesh.scale.x; 
                const speedMult = (type === 'PHOTO') ? 0.3 : 2.0;
                this.spinSpeed = new THREE.Vector3( (Math.random() - 0.5) * speedMult, (Math.random() - 0.5) * speedMult, (Math.random() - 0.5) * speedMult );
                this.calculatePositions();
            }

            calculatePositions() {
                const h = CONFIG.particles.treeHeight;
                const halfH = h / 2;

                if (this.type === 'TRUNK') {
                    const r = Math.random() * 1.5;
                    const y = (Math.random() * h * 0.8) - halfH; 
                    const angle = Math.random() * Math.PI * 2;
                    this.posTree.set(Math.cos(angle) * r, y, Math.sin(angle) * r);
                } 
                else if (this.type === 'BRANCH') {
                    let t = Math.random(); 
                    const y = (t * h) - halfH;
                    let tPow = Math.pow(t, 0.8);
                    let maxR = CONFIG.particles.treeRadius * (1.0 - tPow);
                    if (maxR < 0.5) maxR = 0.5;
                    const r = Math.random() * maxR;
                    const angle = Math.random() * Math.PI * 2;
                    this.posTree.set(Math.cos(angle) * r, y, Math.sin(angle) * r);
                } 
                else {
                    let t = Math.random(); 
                    t = Math.pow(t, 0.8); 
                    const y = (t * h) - halfH;
                    let rMax = CONFIG.particles.treeRadius * (1.0 - t); 
                    if (rMax < 0.5) rMax = 0.5;
                    const angle = t * 50 * Math.PI + Math.random() * Math.PI; 
                    const r = rMax * (0.8 + Math.random() * 0.4); 
                    this.posTree.set(Math.cos(angle) * r, y, Math.sin(angle) * r);
                }

                let rScatter = this.isDust ? (12 + Math.random()*20) : (8 + Math.random()*12);
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                this.posScatter.set(rScatter * Math.sin(phi) * Math.cos(theta), rScatter * Math.sin(phi) * Math.sin(theta), rScatter * Math.cos(phi));
            }

            update(dt, mode, focusTargetMesh) {
                let target = this.posTree;
                if (mode === 'SCATTER') target = this.posScatter;
                else if (mode === 'FOCUS') {
                    if (this.mesh === focusTargetMesh) {
                        const desiredWorldPos = new THREE.Vector3(0, 2, 35);
                        const invMatrix = new THREE.Matrix4().copy(mainGroup.matrixWorld).invert();
                        target = desiredWorldPos.applyMatrix4(invMatrix);
                    } else { target = this.posScatter; }
                }

                const lerpSpeed = (mode === 'FOCUS' && this.mesh === focusTargetMesh) ? 5.0 : 2.0; 
                this.mesh.position.lerp(target, lerpSpeed * dt);

                if (mode === 'SCATTER') {
                    this.mesh.rotation.x += this.spinSpeed.x * dt;
                    this.mesh.rotation.y += this.spinSpeed.y * dt;
                    this.mesh.rotation.z += this.spinSpeed.z * dt;
                } else if (mode === 'TREE') {
                    this.mesh.rotation.x = THREE.MathUtils.lerp(this.mesh.rotation.x, 0, dt);
                    this.mesh.rotation.z = THREE.MathUtils.lerp(this.mesh.rotation.z, 0, dt);
                    this.mesh.rotation.y += 0.5 * dt; 
                }
                
                if (mode === 'FOCUS' && this.mesh === focusTargetMesh) {
                    this.mesh.lookAt(camera.position); 
                }

                let s = this.baseScale;
                if (this.isDust) {
                    s = this.baseScale * (0.8 + 0.4 * Math.sin(clock.elapsedTime * 4 + this.mesh.id));
                    if (mode === 'TREE') s = 0; 
                } else if (mode === 'SCATTER' && this.type === 'PHOTO') {
                    s = this.baseScale * 2.5; 
                } else if (mode === 'FOCUS') {
                    if (this.mesh === focusTargetMesh) s = 4.5; 
                    else s = this.baseScale * 0.8; 
                }
                
                if (this.type && this.type.includes('BOX')) {
                    if (mode === 'FOCUS' && this.mesh !== focusTargetMesh) s = this.baseScale * 0.8;
                }
                
                this.mesh.scale.lerp(new THREE.Vector3(s,s,s), 4*dt);
            }
        }

        function createParticles() {
            const sphereGeo = new THREE.SphereGeometry(0.5, 32, 32); 
            // 保持 segments: 8
            const roundedBoxGeo = new RoundedBoxGeometry(0.55, 0.55, 0.55, 8, 0.12); 
            const curve = new THREE.CatmullRomCurve3([ new THREE.Vector3(0, -0.5, 0), new THREE.Vector3(0, 0.3, 0), new THREE.Vector3(0.1, 0.5, 0), new THREE.Vector3(0.3, 0.4, 0) ]);
            const candyGeo = new THREE.TubeGeometry(curve, 16, 0.08, 8, false);

            const goldMat = new THREE.MeshStandardMaterial({ color: CONFIG.colors.champagneGold, metalness: 1.0, roughness: 0.1, envMapIntensity: 2.0, emissive: 0x443300, emissiveIntensity: 0.3 });
            const greenMat = new THREE.MeshStandardMaterial({ color: CONFIG.colors.deepGreen, metalness: 0.2, roughness: 0.8, emissive: 0x002200, emissiveIntensity: 0.2 });
            const redMat = new THREE.MeshPhysicalMaterial({ color: CONFIG.colors.accentRed, metalness: 0.3, roughness: 0.2, clearcoat: 1.0, emissive: 0x330000 });
            const candyMat = new THREE.MeshStandardMaterial({ map: caneTexture, roughness: 0.3, metalness: 0.1 });
            
            const trunkMat = new THREE.MeshStandardMaterial({
                color: 0xffcc00, 
                metalness: 1.0, 
                roughness: 0.05, 
                envMapIntensity: 3.0, 
                emissive: 0x332200, 
                emissiveIntensity: 0.2
            });

            const branchMat = new THREE.MeshStandardMaterial({ color: CONFIG.colors.branchGreen, roughness: 0.8, metalness: 0.1, emissive: 0x001100, emissiveIntensity: 0.1 });

            for (let i = 0; i < CONFIG.particles.count; i++) {
                const rand = Math.random();
                let mesh, type;
                if (rand < 0.25) { 
                    mesh = createGiftBoxMesh(roundedBoxGeo, greenMat, CONFIG.colors.champagneGold); type = 'BOX'; 
                } 
                else if (rand < 0.50) { 
                    mesh = createGiftBoxMesh(roundedBoxGeo, goldMat, CONFIG.colors.accentRed); type = 'GOLD_BOX'; 
                } 
                else if (rand < 0.80) { 
                    mesh = new THREE.Mesh(sphereGeo, goldMat); type = 'GOLD_SPHERE'; 
                } 
                else if (rand < 0.95) { 
                    mesh = new THREE.Mesh(sphereGeo, redMat); type = 'RED'; 
                } 
                else { 
                    mesh = new THREE.Mesh(candyGeo, candyMat); type = 'CANE'; 
                }

                let s = 0.4 + Math.random() * 0.5;
                if (type && type.includes('BOX')) {
                    s *= 1.5; 
                }

                mesh.scale.set(s,s,s);
                mesh.rotation.set(Math.random()*6, Math.random()*6, Math.random()*6);
                mainGroup.add(mesh);
                particleSystem.push(new Particle(mesh, type, false));
            }

            const trunkGeo = new THREE.OctahedronGeometry(0.4, 0); 
            for(let i=0; i<450; i++) {
                const mesh = new THREE.Mesh(trunkGeo, trunkMat);
                const s = 0.5 + Math.random() * 0.6;
                mesh.scale.set(s, s, s);
                mesh.rotation.set(Math.random()*6, Math.random()*6, Math.random()*6);
                mainGroup.add(mesh);
                particleSystem.push(new Particle(mesh, 'TRUNK', false));
            }

            const branchGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
            for(let i=0; i<800; i++) {
                const mesh = new THREE.Mesh(branchGeo, branchMat);
                const s = 0.3 + Math.random() * 0.4;
                mesh.scale.set(s, s, s);
                mesh.rotation.set(Math.random()*6, Math.random()*6, Math.random()*6);
                mainGroup.add(mesh);
                particleSystem.push(new Particle(mesh, 'BRANCH', false));
            }

            const starShape = new THREE.Shape();
            const sides = 5;
            const innerRadius = 0.65; const outerRadius = 1.0;  
            for (let i = 0; i < sides * 2; i++) {
                const r = (i % 2 === 0) ? outerRadius : innerRadius;
                const a = (i / (sides * 2)) * Math.PI * 2;
                const x = Math.cos(a + Math.PI / 2) * r;
                const y = Math.sin(a + Math.PI / 2) * r;
                if (i === 0) starShape.moveTo(x, y); else starShape.lineTo(x, y);
            }
            starShape.closePath();
            const extrudeSettings = { depth: 0.35, bevelEnabled: true, bevelThickness: 0.1, bevelSize: 0.1, bevelSegments: 4 };
            const starGeo = new THREE.ExtrudeGeometry(starShape, extrudeSettings);
            starGeo.center(); 
            const starMat = new THREE.MeshStandardMaterial({ color: 0xffdd88, emissive: 0xffaa00, emissiveIntensity: 1.0, metalness: 1.0, roughness: 0 });
            const star = new THREE.Mesh(starGeo, starMat);
            star.position.set(0, CONFIG.particles.treeHeight/2 + 1.2, 0);
            mainGroup.add(star);
            
            mainGroup.add(photoMeshGroup);
        }

        function createDust() {
            const geo = new THREE.TetrahedronGeometry(0.08, 0);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffeebb, transparent: true, opacity: 0.8 });
            for(let i=0; i<CONFIG.particles.dustCount; i++) {
                 const mesh = new THREE.Mesh(geo, mat);
                 mesh.scale.setScalar(0.5 + Math.random());
                 mainGroup.add(mesh);
                 particleSystem.push(new Particle(mesh, 'DUST', true));
            }
        }

        function createDefaultPhotos() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,512,512);
            ctx.strokeStyle = '#eebb66'; ctx.lineWidth = 15; ctx.strokeRect(20,20,472,472);
            ctx.font = '500 60px Times New Roman'; ctx.fillStyle = '#eebb66';
            ctx.textAlign = 'center'; 
            ctx.fillText("JOYEUX", 256, 230);
            ctx.fillText("NOEL", 256, 300);
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            addPhotoToScene(tex);
        }

        function fitTextureToSquare(texture) {
            const img = texture.image;
            if (!img) return;
            const aspect = img.width / img.height;
            texture.center.set(0.5, 0.5); 
            if (aspect > 1) {
                texture.repeat.set(1 / aspect, 1);
                texture.offset.x = (1 - 1 / aspect) / 2;
            } else {
                texture.repeat.set(1, aspect);
                texture.offset.y = (1 - aspect) / 2;
            }
        }

        function addPhotoToScene(texture) {
            if (texture.image) {
                fitTextureToSquare(texture);
            }

            const frameGeo = new THREE.BoxGeometry(1.4, 1.4, 0.05);
            const frameMat = new THREE.MeshStandardMaterial({ color: CONFIG.colors.champagneGold, metalness: 1.0, roughness: 0.1 });
            const frame = new THREE.Mesh(frameGeo, frameMat);
            
            const photoGeo = new THREE.PlaneGeometry(1.2, 1.2);
            const photoMat = new THREE.MeshBasicMaterial({ map: texture });
            const photo = new THREE.Mesh(photoGeo, photoMat);
            photo.position.z = 0.04;
            
            const group = new THREE.Group();
            group.add(frame); group.add(photo);
            const s = 0.8; group.scale.set(s,s,s);
            photoMeshGroup.add(group);
            particleSystem.push(new Particle(group, 'PHOTO', false));
        }
        
        function handleImageUpload(e) {
            const files = e.target.files;
            if(!files.length) return;
            Array.from(files).forEach(f => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    new THREE.TextureLoader().load(ev.target.result, (t) => {
                        t.colorSpace = THREE.SRGBColorSpace;
                        addPhotoToScene(t);
                    });
                }
                reader.readAsDataURL(f);
            });
        }

        function setupEvents() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
            document.getElementById('file-input').addEventListener('change', handleImageUpload);
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const time = clock.elapsedTime;

            bgStars.forEach(star => {
                const s = star.baseScale * (0.5 + 0.7 * Math.sin(time * star.blinkSpeed + star.phase));
                star.mesh.scale.setScalar(s);
            });
            if(bgStarGroup) {
                bgStarGroup.rotation.y += 0.02 * dt;
            }

            if (STATE.mode === 'SCATTER') {
                if (STATE.hand.detected) {
                    // 修改：手势控制反转（加负号），符合直觉
                    const targetRotY = -STATE.hand.x * Math.PI * 0.9; 
                    const targetRotX = STATE.hand.y * Math.PI * 0.25;
                    
                    // 计算跟随手势的“拉力”
                    STATE.rotation.velY = (targetRotY - STATE.rotation.y) * 3.0;
                    STATE.rotation.velX = (targetRotX - STATE.rotation.x) * 3.0;

                    STATE.rotation.y += STATE.rotation.velY * dt;
                    STATE.rotation.x += STATE.rotation.velX * dt;
                } else {
                    // 修改：手松开后，垂直方向(X)归零
                    STATE.rotation.velX = THREE.MathUtils.lerp(STATE.rotation.velX, 0, 2.0 * dt);

                    // 修改：水平方向(Y)平滑过渡到恒定的自动旋转速度
                    // 1. 获取当前旋转方向（如果速度太小默认为正向）
                    let dir = Math.sign(STATE.rotation.velY);
                    if(Math.abs(STATE.rotation.velY) < 0.05) dir = 1;

                    // 2. 目标速度为同方向的 0.3 (Tree模式速度)
                    const targetSpeed = dir * 0.3;
                    
                    // 3. 平滑插值当前速度到目标速度
                    STATE.rotation.velY = THREE.MathUtils.lerp(STATE.rotation.velY, targetSpeed, 1.0 * dt);

                    STATE.rotation.y += STATE.rotation.velY * dt;
                    STATE.rotation.x += STATE.rotation.velX * dt;
                }
            } else if (STATE.mode === 'TREE') {
                STATE.rotation.velX = 0;
                STATE.rotation.velY = 0;
                // 自动旋转
                STATE.rotation.y += 0.3 * dt;
                STATE.rotation.x = THREE.MathUtils.lerp(STATE.rotation.x, 0, 2.0 * dt);
            } else {
                STATE.rotation.y += 0.1 * dt; 
            }

            mainGroup.rotation.y = STATE.rotation.y;
            mainGroup.rotation.x = STATE.rotation.x;

            particleSystem.forEach(p => p.update(dt, STATE.mode, STATE.focusTarget));
            composer.render();
        }

        init();
    </script>
</body>
